apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-client.fullname" . }}
  labels:
    {{- include "mcp-client.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      {{- if .Values.idaMcp.enabled }}
      serviceAccountName: {{ include "mcp-client.fullname" . }}-k8s-controller
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.client.port }}
          env:
            - name: CLIENT_HOST
              value: "{{ .Values.client.host }}"
            - name: CLIENT_PORT
              value: "{{ .Values.client.port }}"
          {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
          {{- end }}
            # Authentication
            - name: SECRET_KEY
              value: "{{ .Values.auth.jwtSecret }}"
            - name: JWT_SECRET_KEY
              value: "{{ .Values.auth.jwtSecret }}"
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "{{ .Values.auth.accessTokenExpireMinutes | default 120 }}"
            - name: ADMIN_PASSWORD
              value: "{{ .Values.auth.admin.password }}"
            - name: DEFAULT_ALLOWED_TABS
              value: "{{ .Values.defaultAllowedTabs | default "Home,Settings" }}"
            # SSO / OIDC (Authentik)
            - name: SSO_ENABLED
              value: "{{ .Values.sso.enabled }}"
            {{- if .Values.sso.enabled }}
            - name: OIDC_ISSUER_URL
              value: "{{ .Values.sso.issuerUrl }}"
            - name: OIDC_CLIENT_ID
              value: "{{ .Values.sso.clientId }}"
            - name: OIDC_CLIENT_SECRET
              value: "{{ .Values.sso.clientSecret }}"
            - name: OIDC_REDIRECT_URI
              value: "{{ .Values.sso.redirectUri }}"
            - name: OIDC_SCOPES
              value: "{{ .Values.sso.scopes | default "openid email profile groups" }}"
            {{- end }}
          {{- if .Values.marketPlace.enabled }}
            - name: MARKETPLACE_ENABLED
              value: "true"
            - name: INFRA_CHARTS_API_SERVER
              value: "{{ .Values.marketPlace.infraChartsApiServer }}"
            - name: MARKETPLACE_MAX_AGENTS_PER_USER
              value: "{{ .Values.marketPlace.maxAgentsPerUser | default 5 }}"
            - name: MARKETPLACE_MAX_MCP_PER_USER
              value: "{{ .Values.marketPlace.maxMcpServersPerUser | default 5 }}"
            - name: MARKETPLACE_DEV_TTL_DAYS
              value: "{{ .Values.marketPlace.devTtlDays | default 10 }}"
            - name: ARTIFACTORY_MARKETPLACE_HELM_REPO_DEV
              value: "{{ .Values.marketPlace.artifactoryHelmRepoDev | default "my-helm-dev-local" }}"
            - name: ARTIFACTORY_MARKETPLACE_HELM_REPO_RELEASE
              value: "{{ .Values.marketPlace.artifactoryHelmRepoRelease | default "my-helm-release-local" }}"
          {{- end }}
          {{- if .Values.idaMcp.enabled }}
            # IDA MCP Controller Configuration
            - name: K8S_NAMESPACE
              value: "{{ .Values.idaMcp.k8s.namespace | default .Release.Namespace }}"
            # IDA Proxy names - derive from release name (empty strings in values are ignored)
            - name: IDA_PROXY_DEPLOYMENT
              value: "{{ if .Values.idaMcp.k8s.proxyDeployment }}{{ .Values.idaMcp.k8s.proxyDeployment }}{{ else }}{{ include "mcp-client.fullname" . }}-ida-proxy{{ end }}"
            - name: IDA_PROXY_CONFIGMAP_PORTS
              value: "{{ if .Values.idaMcp.k8s.proxyConfigMapPorts }}{{ .Values.idaMcp.k8s.proxyConfigMapPorts }}{{ else }}{{ include "mcp-client.fullname" . }}-ida-proxy-listen-ports{{ end }}"
            - name: IDA_PROXY_CONFIGMAP_MAP
              value: "{{ if .Values.idaMcp.k8s.proxyConfigMapMap }}{{ .Values.idaMcp.k8s.proxyConfigMapMap }}{{ else }}{{ include "mcp-client.fullname" . }}-ida-proxy-port-map{{ end }}"
            # IDA MCP Server settings (prefixed to avoid K8s service discovery conflicts)
            - name: IDA_MCP_SERVER_IMAGE_REPO
              value: "{{ .Values.idaMcp.k8s.mcpServerImageRepo }}"
            - name: IDA_MCP_SERVER_PORT
              value: "{{ .Values.idaMcp.k8s.mcpServerPort }}"
            - name: IDA_MCP_SERVER_HEALTH_PATH
              value: "{{ .Values.idaMcp.k8s.mcpServerHealthPath | default "/" }}"
            - name: IDA_MCP_SERVICE_NETWORK_POOL
              value: "{{ .Values.service.networkPool }}"
          - name: ALLOWED_MCP_VERSIONS
            value: "{{ .Values.idaMcp.allowedVersions }}"
          - name: PIP_INSTALL_CMD_BASE
            value: "{{ .Values.idaMcp.pipInstallCmdBase }}"
          - name: OPENWEBUI_URL
            value: "{{ .Values.idaMcp.openwebuiUrl }}"
          - name: MCP_NGINX_DNS
            value: "{{ .Values.idaMcp.mcpNginxDns }}"
          - name: INFRA_API_SERVER
            value: "{{ .Values.idaMcp.infraApiServer }}"
          - name: INFRA_CHARTS_API_SERVER
            value: "{{ .Values.idaMcp.infraChartsApiServer }}"
          - name: ALLOWED_HOSTNAME_PATTERNS
            value: "{{ .Values.idaMcp.allowedHostnamePatterns }}"
            - name: PROXY_PORT_MIN
              value: "{{ .Values.idaMcp.proxyPortMin }}"
            - name: PROXY_PORT_MAX
              value: "{{ .Values.idaMcp.proxyPortMax }}"
            - name: IDA_PORT_MIN
              value: "{{ .Values.idaMcp.idaPortMin }}"
            - name: IDA_PORT_MAX
              value: "{{ .Values.idaMcp.idaPortMax }}"
            - name: MCP_GATEWAY_BASE_URL
              value: "{{ .Values.idaMcp.gatewayBaseUrl }}"
            {{- if .Values.idaMcp.bitbucket.enabled }}
            # Bitbucket GitOps Configuration
            - name: BITBUCKET_ENABLED
              value: "true"
            - name: BITBUCKET_URL
              value: "{{ .Values.idaMcp.bitbucket.url }}"
            - name: BITBUCKET_PROJECT
              value: "{{ .Values.idaMcp.bitbucket.project }}"
            - name: BITBUCKET_REPO
              value: "{{ .Values.idaMcp.bitbucket.repo }}"
            - name: BITBUCKET_BRANCH
              value: "{{ .Values.idaMcp.bitbucket.branch }}"
            - name: BITBUCKET_VALUES_PATH
              value: "{{ .Values.idaMcp.bitbucket.valuesPath }}"
            - name: BITBUCKET_USERNAME
              value: "{{ .Values.idaMcp.bitbucket.username }}"
            - name: BITBUCKET_PASSWORD
              value: "{{ .Values.idaMcp.bitbucket.password }}"
            - name: BITBUCKET_EMAIL
              value: "{{ .Values.idaMcp.bitbucket.email }}"
            - name: BITBUCKET_VERIFY_SSL
              value: "{{ .Values.idaMcp.bitbucket.verifySSL }}"
            {{- end }}
            {{- if .Values.idaMcp.artifactory.enabled }}
            # Artifactory Configuration for Docker image versions
            - name: ARTIFACTORY_ENABLED
              value: "true"
            - name: ARTIFACTORY_URL
              value: "{{ .Values.idaMcp.artifactory.url }}"
            - name: ARTIFACTORY_REPO
              value: "{{ .Values.idaMcp.artifactory.repo }}"
            - name: ARTIFACTORY_IMAGE
              value: "{{ .Values.idaMcp.artifactory.image }}"
            - name: ARTIFACTORY_USERNAME
              value: "{{ .Values.idaMcp.artifactory.username }}"
            - name: ARTIFACTORY_PASSWORD
              value: "{{ .Values.idaMcp.artifactory.password }}"
            - name: ARTIFACTORY_VERIFY_SSL
              value: "{{ .Values.idaMcp.artifactory.verifySSL }}"
            - name: ARTIFACTORY_CACHE_TTL
              value: "{{ .Values.idaMcp.artifactory.cacheTTL }}"
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
      restartPolicy: Always
