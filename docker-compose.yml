version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mcp-client-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-mcp_client}
      POSTGRES_USER: ${DATABASE_USER:-mcp_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-mcp_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - mcp-client-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-mcp_user} -d ${DATABASE_NAME:-mcp_client}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MCP Client App (Frontend + Backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-client-app
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${DATABASE_USER:-mcp_user}:${DATABASE_PASSWORD:-mcp_password}@postgres:5432/${DATABASE_NAME:-mcp_client}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-mcp_client}
      DATABASE_USER: ${DATABASE_USER:-mcp_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-mcp_password}
      
      # Server Configuration
      CLIENT_HOST: 0.0.0.0
      CLIENT_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      
      # Authentication
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production-please}
      SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production-please}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      DEFAULT_ALLOWED_TABS: ${DEFAULT_ALLOWED_TABS:-Home,Settings}
      
      # SSO / OIDC (Authentik)
      SSO_ENABLED: ${SSO_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile groups}
      
      # MCP Configuration
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://localhost:8050/mcp/}
      
      # LLM Configuration
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_SSL_VERIFY: ${LLM_SSL_VERIFY:-true}
      
      # Research / IDA Configuration
      PIP_INSTALL_CMD_BASE: ${PIP_INSTALL_CMD_BASE:-"pip install my-company-ida-mcp-plugin"}
      OPENWEBUI_URL: ${OPENWEBUI_URL:-"https://chat.company.internal"}
      MCP_NGINX_DNS: ${MCP_NGINX_DNS:-"https://mcp-gateway.company.internal"}
      INFRA_API_SERVER: ${INFRA_API_SERVER:-"infra-api.company.internal"}
      INFRA_MARKETPLACE_API_SERVER: ${INFRA_MARKETPLACE_API_SERVER:-"marketplace-infra-api.company.internal"}
      MARKETPLACE_MAX_AGENTS_PER_USER: ${MARKETPLACE_MAX_AGENTS_PER_USER:-5}
      MARKETPLACE_MAX_MCP_PER_USER: ${MARKETPLACE_MAX_MCP_PER_USER:-5}
      MARKETPLACE_DEV_TTL_DAYS: ${MARKETPLACE_DEV_TTL_DAYS:-10}
      ARTIFACTORY_MARKETPLACE_HELM_REPO_DEV: ${ARTIFACTORY_MARKETPLACE_HELM_REPO_DEV:-my-helm-dev-local}
      ARTIFACTORY_MARKETPLACE_HELM_REPO_RELEASE: ${ARTIFACTORY_MARKETPLACE_HELM_REPO_RELEASE:-my-helm-release-local}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mcp-client-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    name: mcp-client-postgres-data

networks:
  mcp-client-network:
    name: mcp-client-network
    driver: bridge
