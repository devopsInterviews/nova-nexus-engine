<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#g1)"/>
  <!-- Circuit node top -->
  <circle cx="32" cy="10" r="4" fill="white" opacity="0.9"/>
  <!-- Circuit node left -->
  <circle cx="10" cy="32" r="4" fill="white" opacity="0.9"/>
  <!-- Circuit node right -->
  <circle cx="54" cy="32" r="4" fill="white" opacity="0.9"/>
  <!-- Circuit node bottom -->
  <circle cx="32" cy="54" r="4" fill="white" opacity="0.9"/>
  <!-- Central core -->
  <circle cx="32" cy="32" r="9" fill="white" opacity="0.95"/>
  <!-- Inner dot -->
  <circle cx="32" cy="32" r="4" fill="url(#g1)"/>
  <!-- Connector lines -->
  <line x1="32" y1="14" x2="32" y2="23" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="14" y1="32" x2="23" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="41" y1="32" x2="50" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="32" y1="41" x2="32" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Diagonal connectors (small) -->
  <circle cx="16" cy="16" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="48" cy="16" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="16" cy="48" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="48" cy="48" r="2.5" fill="white" opacity="0.5"/>
  <line x1="18" y1="18" x2="25" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="46" y1="18" x2="39" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="18" y1="46" x2="25" y2="39" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="46" y1="46" x2="39" y2="39" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
